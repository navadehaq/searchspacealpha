title: SearchSpace
description: >-
  Quantitative, competition-based hiring. Companies post data science, ML,
  and algorithmic competitions with deterministic, benchmark-driven rankings.
  Top performers win guaranteed interviews and cash prizes.
baseurl: ""
url: "https://searchspace.net"

# "Submit a Competition" link used site-wide (header nav, footer, homepage
# section). Points at our own Formspree-backed page rather than an external
# form, so it's a relative path run through `relative_url` at each call site.
submit_competition_form_url: "/submit-competition.html"

# Contact / submissions domain referenced on competition pages
submissions_domain: "searchspace.net"

# Central list of competition categories. Used to populate the category
# dropdown on the "Submit a Competition" form, and documents the valid
# values for a competition's front-matter `category` field.
competition_categories:
  - Algorithmic
  - Data Science
  - Machine Learning / Robotics

# Valid values for a competition's front-matter `color:` field. Each name maps
# to a grain-gradient palette (.grain-<name>) defined in assets/css/style.css,
# applied to that competition's landing-page card and hero banner. Falls back
# to "pink" for cards and "purple" for the hero if `color` is omitted.
competition_colors:
  - pink
  - purple
  - blue
  - red
  - green
  - teal
  - orange
  - gold
  - indigo
  - magenta
  - slate

collections:
  competitions:
    output: true
    permalink: /competitions/:path/

defaults:
  - scope:
      path: ""
      type: competitions
    values:
      layout: competition
  - scope:
      path: ""
    values:
      layout: default

markdown: kramdown

exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - node_modules
